<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        /* --- Core Standard Reset & Design Variables --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg-color: #0B0F14;
            --surface-color: rgba(22, 31, 44, 0.7);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-primary: #FFFFFF;
            --text-secondary: #7F8C99;
            --accent-color: #00B4DB;
            --accent-gradient: linear-gradient(135deg, #00B4DB, #0083B0);
            --accent-glow: rgba(0, 180, 219, 0.3);
            --font-main: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
            overflow-y: auto;
            width: 100vw;
            min-height: 100vh;
        }

        /* --- Layout Main Window --- */
        .main-container {
            margin-top: 0; /* हेडर हटने के बाद इसे बिल्कुल टॉप पर सटा दिया */
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- Custom Video Player Module --- */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #main-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- Custom Video Loader --- */
        .video-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 20, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .video-loader.active {
            opacity: 1;
        }

        .premium-spinner {
            width: 46px;
            height: 46px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Interface Control Overlays --- */
        .control-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(to top, rgba(11, 15, 20, 0.85) 0%, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.4) 100%);
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        .control-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .center-btn {
            background: rgba(22, 31, 44, 0.7);
            border: 1px solid var(--surface-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: transform 0.2s, background 0.2s;
        }

        .center-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.1);
        }

        .center-btn .material-icons-round {
            font-size: 36px;
        }

        .bottom-shelf {
            padding: 0 16px 12px;
            width: 100%;
        }

        .timeline-container {
            width: 100%;
            height: 14px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .timeline-slider {
            position: relative;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            transition: height 0.2s ease;
        }

        .timeline-container:hover .timeline-slider {
            height: 6px;
        }

        .buffer-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            width: 0%;
            border-radius: 2px;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent-gradient);
            width: 0%;
            border-radius: 2px;
        }

        .progress-handle {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 12px;
            height: 12px;
            background: #FFF;
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-color);
            transition: transform 0.15s ease;
        }

        .timeline-container:hover .progress-handle {
            transform: translateY(-50%) scale(1);
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-controls-group, .right-controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .shelf-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .shelf-btn .material-icons-round {
            font-size: 26px;
        }

        .time-display {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #FFF;
        }

        .time-divider {
            color: var(--text-secondary);
            margin: 0 2px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .volume-slider-wrapper {
            width: 0px;
            overflow: hidden;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
        }

        .volume-container:hover .volume-slider-wrapper {
            width: 70px;
        }

        #volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #FFF;
            cursor: pointer;
        }

        /* --- Metadata Section Styling --- */
        .meta-section {
            padding: 20px 16px;
            border-bottom: 1px solid var(--surface-border);
        }

        .meta-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .meta-section p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* --- Recommendation Sub-shelf Section --- */
        .related-section {
            padding: 20px 16px 40px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .related-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .related-card {
            background: rgba(22, 31, 44, 0.4);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .related-card:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .thumb-wrapper {
            position: relative;
            width: 100px;
            aspect-ratio: 16 / 9;
            background: #11161D;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .thumb-wrapper .material-icons-round {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--accent-color);
            font-size: 24px;
        }

        .card-info {
            flex: 1;
            overflow: hidden;
        }

        .card-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .card-duration {
            font-size: 11px;
            color: var(--text-secondary);
        }

        :-webkit-full-screen .player-wrapper {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <main class="main-container">
        
        <div class="player-wrapper" id="player-wrapper">
            <video id="main-video" playsinline webkit-playsinline></video>
            
            <div class="video-loader" id="video-loader">
                <div class="premium-spinner"></div>
            </div>

            <div class="control-overlay" id="control-overlay">
                
                <div class="center-controls">
                    <button class="center-btn" id="btn-center-play" aria-label="Play or Pause">
                        <span class="material-icons-round">play_arrow</span>
                    </button>
                </div>

                <div class="bottom-shelf">
                    <div class="timeline-container" id="timeline-container">
                        <div class="timeline-slider">
                            <div class="buffer-bar" id="buffer-bar"></div>
                            <div class="progress-bar" id="progress-bar">
                                <div class="progress-handle"></div>
                            </div>
                        </div>
                    </div>

                    <div class="controls-row">
                        <div class="left-controls-group">
                            <button class="shelf-btn" id="btn-shelf-play">
                                <span class="material-icons-round">play_arrow</span>
                            </button>
                            <div class="time-display">
                                <span id="time-current">00:00</span>
                                <span class="time-divider">/</span>
                                <span id="time-duration">00:00</span>
                            </div>
                        </div>

                        <div class="right-controls-group">
                            <div class="volume-container">
                                <button class="shelf-btn" id="btn-volume">
                                    <span class="material-icons-round">volume_up</span>
                                </button>
                                <div class="volume-slider-wrapper">
                                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
                                </div>
                            </div>
                            <button class="shelf-btn" id="btn-fullscreen">
                                <span class="material-icons-round">fullscreen</span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <section class="meta-section">
            <h2 id="video-title">Loading Class Video...</h2>
            <p id="video-description">Connecting securely to servers to load your lecture stream.</p>
        </section>

        <section class="related-section">
            <h3 class="section-title">Related Lectures</h3>
            <div class="related-list" id="related-list"></div>
        </section>

    </main>

    <script>
        // Application Setup State Context
        const state = {
            videoUrl: '',
            videoTitle: 'Premium Course Lecture',
            videoDesc: 'Welcome to your custom workspace stream.',
            hideControlsTimeout: null,
            mockRecommendations: [
                { id: 1, title: '02. Core Architectural Frameworks', duration: '14:25', url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4' },
                { id: 2, title: '03. Advanced State Mechanics', duration: '22:10', url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4' },
                { id: 3, title: '04. Data Persistency Channels', duration: '18:45', url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4' }
            ]
        };

        // Handle Native Document Mapping Target References
        const el = {
            wrapper: document.getElementById('player-wrapper'),
            video: document.getElementById('main-video'),
            loader: document.getElementById('video-loader'),
            overlay: document.getElementById('control-overlay'),
            btnCenterPlay: document.getElementById('btn-center-play'),
            btnShelfPlay: document.getElementById('btn-shelf-play'),
            timelineContainer: document.getElementById('timeline-container'),
            progressBar: document.getElementById('progress-bar'),
            bufferBar: document.getElementById('buffer-bar'),
            timeCurrent: document.getElementById('time-current'),
            timeDuration: document.getElementById('time-duration'),
            btnVolume: document.getElementById('btn-volume'),
            volumeSlider: document.getElementById('volume-slider'),
            btnFullscreen: document.getElementById('btn-fullscreen'),
            metaTitle: document.getElementById('video-title'),
            metaDesc: document.getElementById('video-description'),
            relatedList: document.getElementById('related-list')
        };

        // Read URL parameters dynamically passed to the player environment
        function parseQueryConfiguration() {
            const params = new URLSearchParams(window.location.search);
            state.videoUrl = params.get('url') || 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4';
            if(params.get('title')) state.videoTitle = params.get('title');
            if(params.get('desc')) state.videoDesc = params.get('desc');
            
            el.metaTitle.textContent = state.videoTitle;
            el.metaDesc.textContent = state.videoDesc;
        }

        // Format media seconds into clean timestamps (00:00)
        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Initialize Custom Player Subsystems
        function initVideoPlayer() {
            parseQueryConfiguration();
            loadVideoSource(state.videoUrl);
            generateRecommendations();
            setupEventHandlers();
            triggerControlsVisibility();
        }

        // Load Video Media Element Engine Safely
        function loadVideoSource(url) {
            el.loader.classList.add('active');
            el.video.src = url;
            el.video.load();
        }

        // Setup Event Listeners Matrix
        function setupEventHandlers() {
            const togglePlay = () => {
                if (el.video.paused) {
                    el.video.play();
                } else {
                    el.video.pause();
                }
                triggerControlsVisibility();
            };

            el.btnCenterPlay.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
            el.btnShelfPlay.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
            el.wrapper.addEventListener('click', toggleControlsActivity);

            el.video.addEventListener('play', () => {
                el.btnCenterPlay.querySelector('.material-icons-round').textContent = 'pause';
                el.btnShelfPlay.querySelector('.material-icons-round').textContent = 'pause';
            });

            el.video.addEventListener('pause', () => {
                el.btnCenterPlay.querySelector('.material-icons-round').textContent = 'play_arrow';
                el.btnShelfPlay.querySelector('.material-icons-round').textContent = 'play_arrow';
            });

            el.video.addEventListener('waiting', () => el.loader.classList.add('active'));
            el.video.addEventListener('playing', () => el.loader.classList.remove('active'));
            el.video.addEventListener('loadedmetadata', () => {
                el.timeDuration.textContent = formatTime(el.video.duration);
                el.loader.classList.remove('active');
            });

            el.video.addEventListener('timeupdate', () => {
                el.timeCurrent.textContent = formatTime(el.video.currentTime);
                const progress = (el.video.currentTime / el.video.duration) * 100;
                el.progressBar.style.width = `${progress}%`;
                
                if (el.video.buffered.length > 0) {
                    const buffered = (el.video.buffered.end(el.video.buffered.length - 1) / el.video.duration) * 100;
                    el.bufferBar.style.width = `${buffered}%`;
                }
            });

            el.timelineContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = el.timelineContainer.getBoundingClientRect();
                const clickPositionX = (e.clientX - rect.left) / rect.width;
                el.video.currentTime = clickPositionX * el.video.duration;
            });

            el.volumeSlider.addEventListener('input', (e) => {
                el.video.volume = e.target.value;
                if(el.video.volume === 0) {
                    el.btnVolume.querySelector('.material-icons-round').textContent = 'volume_off';
                } else if(el.video.volume < 0.5) {
                    el.btnVolume.querySelector('.material-icons-round').textContent = 'volume_down';
                } else {
                    el.btnVolume.querySelector('.material-icons-round').textContent = 'volume_up';
                }
            });

            el.btnVolume.addEventListener('click', (e) => {
                e.stopPropagation();
                el.video.muted = !el.video.muted;
                el.btnVolume.querySelector('.material-icons-round').textContent = el.video.muted ? 'volume_off' : 'volume_up';
            });

            el.btnFullscreen.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) {
                    el.wrapper.requestFullscreen().catch((err) => {
                        console.error(`Error enabling fullscreen UI: ${err.message}`);
                    });
                    el.btnFullscreen.querySelector('.material-icons-round').textContent = 'fullscreen_exit';
                } else {
                    document.exitFullscreen();
                    el.btnFullscreen.querySelector('.material-icons-round').textContent = 'fullscreen';
                }
            });
        }

        function toggleControlsActivity() {
            if (el.overlay.classList.contains('hidden')) {
                triggerControlsVisibility();
            } else {
                el.overlay.classList.add('hidden');
            }
        }

        function triggerControlsVisibility() {
            el.overlay.classList.remove('hidden');
            clearTimeout(state.hideControlsTimeout);
            
            if (!el.video.paused) {
                state.hideControlsTimeout = setTimeout(() => {
                    el.overlay.classList.add('hidden');
                }, 3500);
            }
        }

        function generateRecommendations() {
            el.relatedList.innerHTML = '';
            state.mockRecommendations.forEach(item => {
                const card = document.createElement('div');
                card.className = 'related-card';
                card.innerHTML = `
                    <div class="thumb-wrapper">
                        <span class="material-icons-round">play_circle_filled</span>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${item.title}</div>
                        <div class="card-duration">${item.duration}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    el.metaTitle.textContent = item.title;
                    loadVideoSource(item.url);
                    el.video.play();
                });
                el.relatedList.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', initVideoPlayer);
    </script>
</body>
</html>
