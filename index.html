<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Book Premium Video Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <button class="nav-btn" id="btn-back" onclick="window.history.back();" aria-label="Go Back">
            <span class="material-icons-round">arrow_back_ios_new</span>
        </button>
        <div class="brand-container">
            <span class="brand-logo">SB</span>
            <div class="title-container">
                <h1>Video Player</h1>
                <span class="subtitle">Study Book Premium</span>
            </div>
        </div>
    </header>

    <main class="main-container">
        
        <div class="player-wrapper" id="player-wrapper">
            <video id="main-video" playsinline webkit-playsinline></video>
            
            <div class="video-loader" id="video-loader">
                <div class="premium-spinner"></div>
            </div>

            <div class="control-overlay" id="control-overlay">
                
                <div class="center-controls">
                    <button class="center-btn" id="btn-center-play" aria-label="Play or Pause">
                        <span class="material-icons-round">play_arrow</span>
                    </button>
                </div>

                <div class="bottom-shelf">
                    <div class="timeline-container" id="timeline-container">
                        <div class="timeline-slider">
                            <div class="buffer-bar" id="buffer-bar"></div>
                            <div class="progress-bar" id="progress-bar">
                                <div class="progress-handle"></div>
                            </div>
                        </div>
                    </div>

                    <div class="controls-row">
                        <div class="left-controls-group">
                            <button class="shelf-btn" id="btn-shelf-play">
                                <span class="material-icons-round">play_arrow</span>
                            </button>
                            <div class="time-display">
                                <span id="time-current">00:00</span>
                                <span class="time-divider">/</span>
                                <span id="time-duration">00:00</span>
                            </div>
                        </div>

                        <div class="right-controls-group">
                            <div class="volume-container">
                                <button class="shelf-btn" id="btn-volume">
                                    <span class="material-icons-round">volume_up</span>
                                </button>
                                <div class="volume-slider-wrapper">
                                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
                                </div>
                            </div>
                            <button class="shelf-btn" id="btn-fullscreen">
                                <span class="material-icons-round">fullscreen</span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <section class="meta-section">
            <h2 id="video-title">Loading Class Video...</h2>
            <p id="video-description">Connecting securely to Study Book servers to load your premium lecture stream.</p>
        </section>

        <section class="related-section">
            <h3 class="section-title">Related Lectures</h3>
            <div class="related-list" id="related-list">
                </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
